name: C CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
    env:
      CC: ${{ matrix.compiler }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show compiler version
        run: $CC --version

      - name: Build game
        run: |
          make clean
          make

      - name: Run engine tests
        run: |
          make clean
          make test

      - name: Sanitizer tests
        if: matrix.compiler == 'clang'
        env:
          ASAN_OPTIONS: detect_leaks=0
          UBSAN_OPTIONS: print_stacktrace=1
        run: |
          make clean
          make sanitize
